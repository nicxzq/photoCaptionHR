name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compile:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package metadata
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps

      - name: Compile source
        run: python -m compileall core utils main.py gui.py

      - name: Check CLI entry point
        run: photo-caption-hr --help
